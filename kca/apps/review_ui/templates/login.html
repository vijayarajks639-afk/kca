{% extends "base.html" %}
{% block title %}Log in — KCA review{% endblock %}
{% block body %}
  <div class="card" style="max-width: 380px; margin: 40px auto;">
    <h3>Reviewer login</h3>
    <p class="muted">Signs in against the Keycloak <code>kca</code> realm
      (direct grant, dev-only). Try <code>credit-officer</code> /
      <code>dev-only</code>.</p>
    <form method="post" action="/login">
      <p><label>Username<br><input name="username" autofocus required></label></p>
      <p><label>Password<br><input name="password" type="password" required></label></p>
      <button class="accept" type="submit">Log in</button>
    </form>
  </div>
{% endblock %}
