name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kca
          POSTGRES_PASSWORD: kca
          POSTGRES_DB: kca
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kca" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -e ".[dev]"
      - run: ruff check .
      # exit code 5 = no tests collected; passes until WP-02 adds the first tests
      - run: pytest -q || test $? -eq 5
      # eval gate lands with WP-18: evals/harness blocks merge on golden-set regression
