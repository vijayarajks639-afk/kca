name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: kca
          POSTGRES_PASSWORD: kca
          POSTGRES_DB: kca
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U kca" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -e ".[dev]"
      - run: ruff check .
      # exit code 5 = no tests collected; passes until WP-02 adds the first tests
      - run: pytest -q || test $? -eq 5
      # WP-18 eval gate: run the golden set through the real pipeline. A
      # regression below the DIP's evaluation_gate threshold exits non-zero and
      # blocks the merge (acceptance criterion 1).
      - name: Eval gate (golden-set regression)
        run: python -m kca.evals.harness --output evals-report.json
      # The report is attached to EVERY run, pass or fail (criterion 2).
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            evals-report.json
            evals-report.md
      # WP-19 judge calibration: report judge-human agreement over the SME
      # calibration set. ADVISORY — LLM judgment never blocks a merge (rule 9;
      # the deterministic gate above is the only gate), so this step is
      # continue-on-error and its report is always uploaded.
      - name: Judge calibration (advisory)
        continue-on-error: true
        run: python -m kca.evals.judge --output judge-calibration.json
      - name: Upload judge calibration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-calibration
          path: |
            judge-calibration.json
            judge-calibration.md
